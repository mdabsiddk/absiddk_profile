<svg width="1080" height="200" viewBox="0 0 1080 200" fill="none" xmlns="http://www.w3.org/2000/svg">
<g filter="url(#filter)">
<ellipse cx="540" cy="150" rx="400" ry="40" fill="#7c3aed" fill-opacity="0.35"/>
<ellipse cx="640" cy="130" rx="300" ry="30" fill="#16f2b3" fill-opacity="0.25"/>
</g>
<defs>
<filter id="filter" x="0" y="0" width="1080" height="300" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
<feFlood flood-opacity="0" result="BackgroundImageFix"/>
<feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
<feGaussianBlur stdDeviation="35" result="effect_foregroundBlur"/>
</filter>
</defs>
</svg>
